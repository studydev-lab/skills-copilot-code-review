name: Step 4

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  actions: write
  issues: write

env:
  REVIEW_FILE: ".github/steps/x-review.md"

jobs:
  find_exercise:
    if: github.event.pull_request.merged == true
    name: 실습 이슈 찾기
    uses: skills-kr/exercise-toolkit/.github/workflows/find-exercise-issue.yml@kr-v0.6.0

  check_step_work:
    name: 작업 확인
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 마지막 댓글 찾기
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: 댓글 업데이트 - 작업 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: 저장소 규칙 세트 존재 확인
        if: ${{ github.event.repository.private == false }}
        id: check-ruleset
        continue-on-error: true
        run: |
          response=$(gh api repos/${{ github.repository }}/rulesets --jq '.[].name' 2>/dev/null || echo "")
          echo $response
          if echo "$response" | grep -i "copilot" || echo "$response" | grep -i "review"; then
            echo "ruleset_exists=true" >> $GITHUB_OUTPUT
          else
            echo "ruleset_exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 댓글 업데이트 - 단계 결과
        if: ${{ github.event.repository.private == false }}
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 4
            results_table:
              - description: "Repository ruleset created that requires Copilot reviews"
                passed: ${{ steps.check-ruleset.outcome == 'success' }}

      - name: 모든 확인 통과 여부 검사
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_review_content:
    name: 리뷰 내용 게시
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 생성 - 단계 완료 - 최종 리뷰
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/lesson-review.md

      - name: 댓글 생성 - 리뷰 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.REVIEW_FILE }}

      - name: 현재 워크플로우 비활성화
        run: gh workflow disable "${{github.workflow}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 완료 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "'"$SESSION_ID"'",
              "type": "end",
              "step": 4,
              "description": "실습 완료",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            }' || true

  finish_exercise:
    name: 실습 완료
    needs: [find_exercise, post_review_content]
    uses: skills-kr/exercise-toolkit/.github/workflows/finish-exercise.yml@kr-v0.6.0
    with:
      issue-url: ${{ needs.find_exercise.outputs.issue-url }}
      exercise-title: "GitHub Copilot 코드 리뷰"
      update-readme-with-congratulations: false
